<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
    <title>Status</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white font-sans overflow-hidden select-none">

    <!-- SETUP VIEW -->
    <div id="setup-area" class="hidden fixed inset-0 z-[200] bg-black flex flex-col items-center justify-center p-6 text-center">
        <h1 class="text-6xl font-black italic tracking-tighter mb-2">STATUS</h1>
        <p class="text-gray-500 mb-10 font-bold uppercase tracking-[0.3em] text-[10px]">Ephemeral Identity</p>
        <input type="text" id="username-input" placeholder="NICKNAME" class="bg-gray-900 border border-gray-800 p-5 rounded-2xl mb-4 w-full max-w-xs text-center text-xl font-bold outline-none focus:border-blue-600 transition-all">
        <button onclick="saveUser()" class="bg-blue-600 w-full max-w-xs py-5 rounded-2xl font-black shadow-2xl active:scale-95 transition-transform">JOIN THE STREAM</button>
    </div>

    <!-- MAIN APP WRAPPER -->
    <div id="app" class="h-screen w-full flex flex-col relative">
        
        <!-- 1. HOME VIEW (TikTok Stream) -->
        <div id="view-home" class="view-section active h-full w-full relative overflow-hidden bg-black pb-24">
            
            <!-- MEDIA LAYER (Deepest) -->
            <div id="stream-container" class="absolute inset-0 w-full h-full flex items-center justify-center z-10"></div>

            <!-- GESTURE LAYER (Middle) -->
            <div class="absolute inset-0 z-20 flex">
                <div id="tap-left" class="w-1/4 h-full"></div>
                <div id="tap-right" class="w-3/4 h-full"></div>
            </div>

            <!-- UI OVERLAY LAYER (Top) -->
            <div class="absolute inset-0 z-30 pointer-events-none flex flex-col">
                <!-- Top UI: Progress & Labels -->
                <div class="w-full pt-2 px-2">
                    <div id="progress-container" class="w-full flex gap-1 mb-4"></div>
                    <div class="flex justify-between items-start px-4">
                        <div class="flex flex-col drop-shadow-lg">
                            <h1 class="text-2xl font-black italic tracking-tighter leading-none">STATUS</h1>
                            <span id="stream-username" class="text-xs font-black uppercase tracking-widest text-blue-400 mt-1"></span>
                        </div>
                        <!-- Controls -->
                        <div class="flex gap-3 pointer-events-auto">
                            <button onclick="toggleMute()" id="mute-btn" class="bg-black/20 backdrop-blur-md w-12 h-12 rounded-full border border-white/10 flex items-center justify-center text-xl">🔇</button>                            <button onclick="togglePlay()" id="play-btn" class="bg-black/20 backdrop-blur-md w-12 h-12 rounded-full border border-white/10 flex items-center justify-center text-xl">⏸</button>
                        </div>
                    </div>
                </div>
<!-- Bottom UI: Engagement -->
<div class="mt-auto p-6 pb-32 flex justify-between items-end">
    <div class="flex flex-col gap-2 pointer-events-auto">
        <div class="flex items-center gap-2 bg-black/40 backdrop-blur-md px-4 py-2 rounded-full border border-white/5">
            <span class="text-sm">👁️</span>
            <span id="stream-view-count" class="font-black text-xs">0</span>
        </div>
    </div>
    <button onclick="voteCurrent()" class="pointer-events-auto bg-orange-600 w-20 h-20 rounded-full shadow-2xl shadow-orange-900/50 active:scale-75 transition-all flex flex-col items-center justify-center border-4 border-black">
        <span class="text-3xl">🔥</span>
        <span id="stream-vote-count" class="font-black text-[10px] -mt-1">0</span>
    </button>
</div>
                   <!-- 2. UPLOAD VIEW -->
        <div id="view-upload" class="view-section hidden h-full w-full bg-black flex flex-col items-center justify-center p-10">
            <div class="mb-12 text-center">
                <div class="text-6xl mb-4">📤</div>
                <h2 class="text-4xl font-black uppercase italic tracking-tighter">Share Status</h2>
                <p class="text-gray-500 font-bold text-xs tracking-widest mt-2">VIDEO OR PHOTO • MAX 20MB</p>
            </div>
            <button id="upload-btn" onclick="document.getElementById('media-input').click()" class="bg-white text-black w-full py-8 rounded-[2rem] font-black text-2xl shadow-white/10 shadow-2xl active:scale-95 transition-all">
                OPEN GALLERY
            </button>
            <input type="file" id="media-input" class="hidden" accept="image/*,video/*" onchange="handleFile(this)">
            <p id="status-msg" class="mt-8 text-blue-500 font-black text-xs uppercase tracking-[0.2em]"></p>
        </div>

        <!-- 3. RANKINGS VIEW -->
        <div id="view-poll" class="view-section hidden h-full w-full bg-black flex flex-col p-6 overflow-y-auto pb-32">
            <div class="pt-8 mb-10">
                <h2 class="text-5xl font-black italic tracking-tighter">TOP 100</h2>
                <p class="text-orange-500 font-black text-[10px] tracking-[0.3em] uppercase mt-1">Global Popularity Poll</p>
            </div>
            <div id="poll-list" class="flex flex-col gap-3"></div>
        </div>

        <!-- BOTTOM NAVIGATION -->
        <nav class="fixed bottom-0 left-0 w-full h-24 bg-black/60 backdrop-blur-2xl border-t border-white/5 flex justify-around items-center z-[100] px-6 pb-4">
            <button onclick="switchTab('home')" class="nav-btn flex flex-col items-center gap-1 text-gray-600 transition-all" id="nav-home">
                <svg class="w-7 h-7" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                <span class="text-[9px] font-black tracking-widest">HOME</span>
            </button>            <button onclick="switchTab('upload')" class="nav-btn bg-white w-14 h-14 rounded-2xl flex items-center justify-center shadow-xl active:scale-90 transition-transform" id="nav-upload">
                <svg class="w-8 h-8 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="4"><path d="M12 5v14M5 12h14"/></svg>
            </button>
            <button onclick="switchTab('poll')" class="nav-btn flex flex-col items-center gap-1 text-gray-600 transition-all" id="nav-poll">
                <svg class="w-7 h-7" fill="currentColor" viewBox="0 0 24 24"><path d="M16 11V5h4v6h-4zm-6 4V5h4v10h-4zm-6 4V5h4v14H4z"/></svg>
                <span class="text-[9px] font-black tracking-widest">RANKINGS</span>
            </button>
        </nav>

    </div>

    <script src="script.js"></script>
</body>
</html>

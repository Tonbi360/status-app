<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Status</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white font-sans overflow-x-hidden select-none">

    <div id="app" class="min-h-screen w-full flex flex-col p-4">
        <header class="flex justify-between items-center py-4">
            <h1 class="text-3xl font-bold italic tracking-tighter">STATUS</h1>
            <p id="user-display" class="text-gray-500 text-xs font-mono"></p>
        </header>
        
        <!-- Setup View -->
        <div id="setup-area" class="hidden flex-1 flex flex-col items-center justify-center">
            <input type="text" id="username-input" placeholder="Enter Nickname" class="bg-gray-900 border border-gray-700 p-4 rounded-2xl mb-4 w-72 text-center text-xl outline-none focus:border-blue-600 transition-colors">
            <button onclick="saveUser()" class="bg-blue-600 px-10 py-4 rounded-full font-bold shadow-lg shadow-blue-900/20 active:scale-95 transition-transform">Start Sharing</button>
        </div>

        <!-- Main View -->
        <div id="main-area" class="hidden flex-1 flex flex-col">
            <div class="flex flex-col items-center py-8 border-b border-gray-900">
                <button id="upload-btn" onclick="document.getElementById('media-input').click()" class="bg-white text-black px-12 py-4 rounded-full font-black text-lg shadow-xl active:scale-95 transition-all">
                    + POST STATUS
                </button>
                <input type="file" id="media-input" class="hidden" accept="image/*,video/*" onchange="handleFile(this)">
                <p id="status-msg" class="mt-4 text-[10px] text-blue-500 font-bold uppercase tracking-widest text-center px-4"></p>
            </div>

            <div class="mt-8">
                <div class="flex justify-between items-end mb-4">
                    <h2 class="text-sm font-black text-gray-500 uppercase tracking-[0.2em]">Popularity Poll</h2>
                    <span class="text-[10px] text-gray-600 font-bold">Resets every 24h</span>
                </div>
                <div id="feed-grid" class="grid grid-cols-2 gap-4"></div>
            </div>
        </div>
    </div>

    <!-- FULL SCREEN VIEWER OVERLAY -->
    <div id="viewer" class="fixed inset-0 bg-black z-50 flex-col items-center justify-center">
        <!-- Progress Bars -->
        <div id="progress-container" class="absolute top-0 left-0 w-full p-2 flex gap-1 z-[70]"></div>

        <!-- Header -->
        <div class="absolute top-4 left-0 w-full p-4 z-[70] flex justify-between items-center bg-gradient-to-b from-black/60 to-transparent">
            <span id="viewer-name" class="font-bold text-lg"></span>
            <button onclick="closeViewer()" class="text-3xl px-2">&times;</button>
        </div>
        
        <!-- Navigation Tap Zones -->
        <div class="absolute inset-0 z-[60] flex">
            <div id="tap-left" class="w-1/3 h-full"></div>
            <div id="tap-right" class="w-2/3 h-full"></div>
        </div>

        <!-- Media -->
        <div id="viewer-content" class="w-full h-full flex items-center justify-center z-50"></div>

        <!-- Viewer Footer -->
        <div id="viewer-footer" class="absolute bottom-0 left-0 w-full p-8 z-[70] flex items-center justify-between bg-gradient-to-t from-black/80 to-transparent">
            <!-- View Count -->
            <div class="flex items-center gap-2 bg-white/10 px-4 py-2 rounded-full backdrop-blur-md">
                <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                <span id="viewer-view-count" class="font-bold text-xs">0</span>
            </div>

            <!-- Vote Button -->
            <button onclick="voteCurrent()" class="flex items-center gap-2 bg-orange-600 px-6 py-2 rounded-full shadow-lg shadow-orange-900/40 active:scale-90 transition-transform">
                <span class="text-lg">🔥</span>
                <span id="viewer-vote-count" class="font-black text-xs">0</span>
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
    </html>

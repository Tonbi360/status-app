<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Status</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white font-sans overflow-x-hidden select-none">

    <div id="app" class="min-h-screen w-full flex flex-col p-4">
        <header class="flex justify-between items-center py-4">
            <h1 class="text-3xl font-bold italic tracking-tighter">STATUS</h1>
            <p id="user-display" class="text-gray-500 text-xs font-mono"></p>
        </header>
        
        <div id="setup-area" class="hidden flex-1 flex flex-col items-center justify-center">
            <input type="text" id="username-input" placeholder="Enter Nickname" class="bg-gray-900 border border-gray-700 p-4 rounded-2xl mb-4 w-72 text-center text-xl outline-none focus:border-blue-600 transition-colors">
            <button onclick="saveUser()" class="bg-blue-600 px-10 py-4 rounded-full font-bold shadow-lg shadow-blue-900/20 active:scale-95 transition-transform">Start Sharing</button>
        </div>

        <div id="main-area" class="hidden flex-1 flex flex-col">
            <div class="flex flex-col items-center py-8 border-b border-gray-900">
                <button id="upload-btn" onclick="document.getElementById('media-input').click()" class="bg-white text-black px-12 py-4 rounded-full font-black text-lg shadow-xl active:scale-95 transition-all">
                    + POST STATUS
                </button>
                <input type="file" id="media-input" class="hidden" accept="image/*,video/*" onchange="handleFile(this)">
                <p id="status-msg" class="mt-4 text-[10px] text-blue-500 font-bold uppercase tracking-widest"></p>
            </div>

            <div class="mt-8">
                <h2 class="text-sm font-black text-gray-500 uppercase tracking-[0.2em] mb-4">Discovery Feed</h2>
                <div id="feed-grid" class="grid grid-cols-2 gap-4"></div>
            </div>
        </div>
    </div>

    <div id="viewer" class="fixed inset-0 bg-black z-50 flex-col items-center justify-center">
        <div class="absolute top-0 left-0 w-full p-4 z-50 flex flex-col gap-2 bg-gradient-to-b from-black/80 to-transparent">
            <div class="flex justify-between items-center">
                <span id="viewer-name" class="font-bold text-lg"></span>
                <button onclick="closeViewer()" class="text-3xl p-2">&times;</button>
            </div>
        </div>
        <div id="viewer-content" class="w-full h-full flex items-center justify-center"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .aspect-vertical { aspect-ratio: 9/16; }
    </style>
</head>
<body class="bg-black text-white font-sans">

    <div id="app" class="min-h-screen w-full flex flex-col p-4">
        <header class="flex justify-between items-center py-4">
            <h1 class="text-3xl font-bold">Status</h1>
            <p id="user-display" class="text-gray-500 text-xs"></p>
        </header>
        
        <!-- Setup View -->
        <div id="setup-area" class="hidden flex-1 flex flex-col items-center justify-center">
            <input type="text" id="username-input" placeholder="Enter Nickname" class="bg-gray-900 border border-gray-700 p-3 rounded-lg mb-4 w-64 text-center">
            <button onclick="saveUser()" class="bg-blue-600 px-8 py-3 rounded-full font-bold">Start</button>
        </div>

        <!-- Main View -->
        <div id="main-area" class="hidden flex-1 flex flex-col">
            <!-- Upload Section -->
            <div class="flex flex-col items-center py-6 border-b border-gray-800">
                <button id="upload-btn" onclick="document.getElementById('media-input').click()" class="bg-white text-black px-8 py-3 rounded-full font-bold shadow-lg active:scale-95 transition-transform">
                    + Post Status
                </button>
                <input type="file" id="media-input" class="hidden" accept="image/*,video/*" onchange="handleFile(this)">
                <p id="status-msg" class="mt-2 text-xs text-blue-400 font-medium"></p>
            </div>

            <!-- Feed Section -->
            <div class="mt-6">
                <h2 class="text-xl font-bold mb-4">Discovery</h2>
                <div id="feed-grid" class="grid grid-cols-2 gap-3">
                    <!-- Statuses will appear here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://nxmngjyiivylzovwqpki.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im54bW5nanlpaXZ5bHpvdndxcGtpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2MDc4OTksImV4cCI6MjA5MTE4Mzg5OX0.D0ysMqpxxpFBzUuTfNe4aN0OrxuOqVEu4WC_hRgcRYQ";
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxNFRzxTH00ccLcapzKhZ_oMtYcXliOOkzBbjYXPECP4PvlBa6fnNhVL1_xiBX2GEMn/exec";

        let userId = localStorage.getItem('status_userId');
        let username = localStorage.getItem('status_username');

        function init() {
            if (userId && username) {
                document.getElementById('main-area').classList.remove('hidden');
                document.getElementById('setup-area').classList.add('hidden');
                document.getElementById('user-display').innerText = username;
                loadFeed();
            } else {
                document.getElementById('setup-area').classList.remove('hidden');
                document.getElementById('main-area').classList.add('hidden');
            }
        }

        function saveUser() {
            const input = document.getElementById('username-input').value;
            if (input.length < 2) return alert("Nickname too short");
            userId = 'uid_' + Math.random().toString(36).substr(2, 9);
            username = input;
            localStorage.setItem('status_userId', userId);
            localStorage.setItem('status_username', username);
            location.reload();
        }

        async function handleFile(input) {
            const file = input.files[0];
            if (!file) return;
            const msg = document.getElementById('status-msg');
            msg.innerText = "Uploading...";
            
            const fileName = `${userId}_${Date.now()}.${file.name.split('.').pop()}`;
            try {
                const up = await fetch(`${SUPABASE_URL}/storage/v1/object/status-media/${fileName}`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${SUPABASE_KEY}`, 'apikey': SUPABASE_KEY, 'Content-Type': file.type },
                    body: file
                });
                if (!up.ok) throw new Error("Upload Failed");

                const publicUrl = `${SUPABASE_URL}/storage/v1/object/public/status-media/${fileName}`;
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ userId, username, mediaUrl: publicUrl, type: file.type.startsWith('video') ? 'video' : 'image' })
                });

                msg.innerText = "Posted!";
                loadFeed();
            } catch (e) { msg.innerText = "Error"; }
        }

        async function loadFeed() {
            const grid = document.getElementById('feed-grid');
            grid.innerHTML = "<p class='text-gray-600'>Loading feed...</p>";
            
            try {
                const response = await fetch(GOOGLE_SCRIPT_URL);
                const data = await response.json();
                
                grid.innerHTML = "";
                // Reverse to show newest first
                data.reverse().forEach(status => {
                    const card = document.createElement('div');
                    card.className = "relative aspect-vertical bg-gray-900 rounded-xl overflow-hidden border border-gray-800";
                    
                    if (status.Type === 'image') {
                        card.innerHTML = `<img src="${status.MediaURL}" class="w-full h-full object-cover">`;
                    } else {
                        card.innerHTML = `<video src="${status.MediaURL}" class="w-full h-full object-cover" muted loop playsinline onmouseover="this.play()" onmouseout="this.pause()"></video>`;
                    }
                    
                    card.innerHTML += `<div class="absolute bottom-0 left-0 w-full p-2 bg-gradient-to-t from-black text-[10px] font-bold">${status.Username}</div>`;
                    grid.appendChild(card);
                });
            } catch (e) { grid.innerHTML = "Failed to load feed."; }
        }

        init();
    </script>
</body>
  </html>
